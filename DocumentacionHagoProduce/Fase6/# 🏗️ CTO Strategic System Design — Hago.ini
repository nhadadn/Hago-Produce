#### 3.2 Dónde Vive Cada Componente Crítico

**CRA Service**
- **Ubicación:** `src/lib/services/compliance/cra.service.ts`
- **Responsabilidad única:** Dado un `Invoice` con campos CRA poblados, generar el XML estructurado según estándares CRA y firmarlo con X.509.
- **No hace:** CRUD de facturas, cálculo de impuestos (eso es `TaxCalculationService`), envío por email.
- **Input:** `Invoice` con `taxRegion`, `gstAmount`, `hstAmount`, `pstAmount` poblados.
- **Output:** `{ xml: string, signature: string, referenceNumber: string }`

**XML Generator**
- **Ubicación:** `src/lib/services/compliance/xml-generator.service.ts`
- **Responsabilidad única:** Construir el string XML según el schema CRA. Stateless, sin efectos secundarios.
- **Separado de `CRAService`** porque el XML puede necesitar validarse independientemente.

**X509 Signer**
- **Ubicación:** `src/lib/services/compliance/x509-signer.service.ts`
- **Responsabilidad única:** Firmar un string XML con el certificado X.509 del negocio.
- **El certificado** se almacena como variable de entorno (`CRA_CERT_PEM`, `CRA_PRIVATE_KEY_PEM`) — nunca en la DB.

**Stripe Service**
- **Ubicación:** `src/lib/services/payments/stripe.service.ts`
- **Responsabilidad única:** Crear PaymentIntents, manejar webhooks de Stripe, registrar pagos.
- **Regla crítica:** Stripe solo procesa facturas con `craXmlGenerated: true`. No se cobra sobre facturas sin validez fiscal.

**WhatsApp Cloud API Service**
- **Ubicación:** `src/lib/services/channels/whatsapp-cloud.service.ts`
- **Responsabilidad única:** Enviar y recibir mensajes via Meta WhatsApp Cloud API (no Twilio).
- **Coexistencia:** Durante la migración, `WhatsAppService` (Twilio) y `WhatsAppCloudService` (Meta) coexisten. El `ChannelRouter` decide cuál usar.

**Channel Router**
- **Ubicación:** `src/lib/services/channels/channel-router.service.ts`
- **Responsabilidad única:** Dado un `customerId` y un mensaje, determinar el canal correcto (WhatsApp Cloud, Telegram, Email) y enrutar.
- **Reemplaza** la lógica dispersa de selección de canal en `PurchaseOrdersService` y `NotificationService`.

#### 3.3 Flujo CRA Completo

```
Invoice (DRAFT)
    ↓
TaxCalculationService.calculate(province, subtotal)
    → gstAmount, hstAmount, pstAmount
    ↓
Invoice actualizada con campos fiscales
    ↓
CRAService.generateXML(invoice)
    → XMLGeneratorService.build(invoice)  →  XML string
    → X509SignerService.sign(xml)         →  XML firmado
    → Invoice.craXmlGenerated = true
    → Invoice.craSubmittedAt = now()
    ↓
Invoice (SENT) — ahora con validez fiscal
    ↓
StripeService.createPaymentIntent(invoice)  ← solo si craXmlGenerated: true
    ↓
Invoice (PAID) cuando Stripe confirma
```

#### 3.4 Flujo WhatsApp Cloud API

```
Meta Webhook → POST /api/v1/bot/webhook/whatsapp-cloud
    ↓
Verificación de firma (Meta HMAC-SHA256)
    ↓
ChannelRouter.route(message)
    ↓
CommandBus.execute() o IntentRegistry.execute()
    ↓
WhatsAppCloudService.sendMessage(response)
```

**Migración gradual:**
```
Semana 1-2: WhatsApp Cloud API activo en paralelo con Twilio
Semana 3:   Nuevos clientes → WhatsApp Cloud API
Semana 4:   Clientes existentes migrados → Twilio deprecado (no eliminado)
```

