      quantity: number;
      unitPrice: number;
      totalPrice: number;
    }>;
  };
  supplier: {
    name: string;
    businessNumber: string;  // BN de CRA del negocio (de env var)
    address: string;
  };
  customer: {
    name: string;
    businessNumber?: string;  // BN del cliente (opcional)
    address?: string;
    province: string;
  };
}

class XMLGeneratorService {
  // Genera el XML completo de la factura CRA
  static generate(data: CRAInvoiceData): string

  // Valida que el XML generado es bien formado (no valida contra schema CRA)
  static isWellFormed(xml: string): boolean

  // Retorna el XML con indentación para debugging
  static prettify(xml: string): string
}
