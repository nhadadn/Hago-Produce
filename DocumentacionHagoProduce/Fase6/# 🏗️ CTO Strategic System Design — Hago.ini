### 4️⃣ RIESGOS ESTRATÉGICOS REALES

#### Riesgo 1: CRA XML sin Validación Oficial — CRÍTICO

**Descripción:** El schema XML de CRA para GST/HST no tiene un validador público oficial fácilmente accesible. Generar XML "que parece correcto" sin validación real es una bomba de tiempo fiscal.

**Evidencia:** El Sprint 5 Plan original asumía "validar XML generado contra schema oficial de CRA" sin especificar cómo. Eso es una suposición no verificada.

**Mitigación:**
1. Investigar el schema XML de CRA **antes** de escribir una línea de código del `XMLGeneratorService`.
2. Crear un conjunto de XMLs de ejemplo válidos (obtenidos de la documentación CRA o de un contador canadiense) como fixtures de test.
3. Si el schema CRA no está disponible públicamente, implementar el formato de factura electrónica estándar canadiense (UBL 2.1 o el formato específico de CRA para pequeñas empresas).
4. **Decisión de fallback:** Si la validación CRA no puede garantizarse en Sprint 6, implementar el XML como "formato interno" y marcar `craXmlGenerated: false` hasta validación manual. No bloquear el go-live por esto.

#### Riesgo 2: Certificado X.509 en Variables de Entorno — ALTO

**Descripción:** Almacenar certificados X.509 como variables de entorno en Vercel es funcional pero tiene limitaciones: rotación manual, sin auditoría de acceso, sin expiración automática.

**Mitigación Sprint 6:** Variables de entorno en Vercel es aceptable para el volumen actual. Documentar fecha de expiración del certificado. Sprint 7 evalúa AWS Secrets Manager o similar.

**Lo que NO hacer:** Almacenar el certificado en la DB. Nunca.

#### Riesgo 3: Migración WhatsApp Twilio → Meta con Clientes Activos — ALTO

**Descripción:** Hay clientes que actualmente usan el bot de WhatsApp via Twilio. Una migración mal ejecutada puede resultar en pérdida de sesiones activas, mensajes no entregados, o números de teléfono que dejan de funcionar.

**Mitigación:**
1. Período de coexistencia de 2 semanas mínimo.
2. El `ChannelRouter` decide el canal — no el cliente.
3. Migración por lotes: primero clientes inactivos (sin mensajes en 7 días), luego activos.
4. Rollback plan: si WhatsApp Cloud API falla, el `ChannelRouter` vuelve a Twilio automáticamente.

#### Riesgo 4: Stripe sobre Facturas sin Validez Fiscal — CRÍTICO

**Descripción:** Si Stripe se implementa antes de que CRA esté completo, se pueden cobrar facturas que no tienen validez fiscal. Esto es un riesgo legal real para el cliente.

**Mitigación:** Regla de negocio no negociable en código:
```typescript
// stripe.service.ts
if (!invoice.craXmlGenerated) {
  throw new Error('Cannot process payment for invoice without CRA XML');
}
```

Esta validación debe estar en el servicio, no solo en el endpoint.

#### Riesgo 5: Worker Leaks en Jest Contaminando CI — MEDIO

**Descripción:** Los tests de Google Sheets y Telegram tardan >30s y generan warnings de "worker process failed to exit gracefully". En Sprint 6, con más tests, esto puede hacer el CI inestable.

**Mitigación (Semana 1, Día 1):**
```javascript
// jest.config.js
module.exports = {
  // ...
  testTimeout: 15000,
  forceExit: true,
  detectOpenHandles: true,
}
```
Identificar qué mocks no están siendo limpiados con `afterEach(() => jest.clearAllMocks())`.

#### Riesgo 6: `source` en `ProductPrice` como String Libre — BAJO (pero acumulativo)

**Descripción:** El enum `PriceSource` existe en el schema pero la columna `source` en `product_prices` sigue siendo `String?`. Hay registros con valores `"manual"` y `"make_automation"` que no mapean al enum.

**Mitigación Sprint 6:** Migración de datos en dos pasos:
1. `UPDATE product_prices SET source = 'MANUAL' WHERE source = 'manual'`
2. `UPDATE product_prices SET source = 'MAKE_WEBHOOK' WHERE source = 'make_automation'`
3. Luego `ALTER COLUMN source TYPE PriceSource USING source::PriceSource`

Esto va en la migración de schema de Sprint 6.

