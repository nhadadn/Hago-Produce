### 8️⃣ QUÉ NO HACER EN SPRINT 6

**No hacer Redis.** Los N+1 queries fueron resueltos en Sprint 5. La latencia es aceptable. Redis agrega complejidad operacional sin beneficio medible en el volumen actual (~20 PDFs/semana, operaciones B2B de baja concurrencia). Criterio para reconsiderar: latencia p95 > 800ms en endpoints con queries optimizados. Medir primero.

**No hacer multi-tenancy.** El sistema es single-tenant por diseño hasta Sprint 7. Agregar multi-tenancy ahora contamina todos los servicios con `tenantId` y duplica la complejidad de las migraciones.

**No hacer RAG avanzado (re-ranking, Cross-Encoder, HallucinationDetector).** El chatbot funciona. La tasa de alucinaciones no ha sido medida. No se optimiza lo que no se ha medido. Si hay quejas de usuarios reales sobre alucinaciones, entonces se prioriza.

**No hacer Terraform / IaC.** Vercel + Neon con variables de entorno es suficiente para el volumen actual. IaC agrega overhead de mantenimiento sin beneficio proporcional hasta Sprint 7+.

**No hacer tests E2E con Playwright.** Los tests unitarios y de integración cubren el 80%+ del código. Playwright agrega tiempo de CI y fragilidad. Priorizar cuando haya un equipo de QA dedicado.

**No hacer OWASP ZAP scan completo.** El rate limiting, HMAC validation, y JWT están implementados. Un scan completo es una tarea de auditoría externa, no de sprint de desarrollo.

**No eliminar Make.com webhook.** Hay datos en vuelo. Se depreca, no se elimina. Eliminación en Sprint 7 cuando se confirme que ningún cliente activo lo usa.

