### 1️⃣ DIAGNÓSTICO EJECUTIVO

#### El Problema Estratégico de Sprint 6

Sprint 5 consolidó el **Core ERP Operativo**. Sprint 6 tiene que resolver **tres dimensiones simultáneas** que tienen velocidades de maduración distintas:

| Dimensión | Urgencia | Complejidad | Riesgo si se mezcla |
|---|---|---|---|
| **CRA Compliance** (facturación legal) | CRÍTICA | Alta | Requiere CI/CD verde (✅ ya existe) |
| **Canal WhatsApp** (migración Twilio → Meta) | ALTA | Media | Riesgo de downtime en canal activo |
| **Monetización** (Stripe + Dashboard) | ALTA | Media | Depende de Invoice CRA-compliant |

**El error que NO debemos cometer:** Tratar estas tres dimensiones como independientes y ejecutarlas en paralelo sin secuencia. Tienen dependencias técnicas reales:

```
CRA XML + Firma Digital
        ↓
Invoice CRA-compliant (con campos fiscales reales)
        ↓
Stripe (cobra sobre facturas válidas)
        ↓
Dashboard de rentabilidad (datos fiscales correctos)
```

```
WhatsApp Cloud API (Meta)
        ↓
Migración de sesiones activas
        ↓
Deprecar Twilio (no eliminar)
```

Estas dos cadenas son **paralelas entre sí** pero cada una es **secuencial internamente**.

