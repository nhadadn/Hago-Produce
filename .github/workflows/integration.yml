name: Integration Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      # We can use service containers, OR use docker-compose step.
      # Using docker-compose ensures exact match with local dev environment.
      # So we skip services here and use steps.
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Test Database
        run: docker-compose -f docker-compose.test.yml up -d

      - name: Wait for Database
        run: |
          # Simple wait loop or use the setup script which has wait logic
          npm run test:integration:setup

      - name: Run Integration Tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5434/hago_produce_test?schema=public
          # Other env vars from .env.test can be loaded automatically by Next/Jest or passed here if needed.
          # Since we use dotenv in setup script, it should work fine.

      - name: Teardown
        if: always()
        run: docker-compose -f docker-compose.test.yml down -v
