<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
    .container { max-width: 640px; margin: 0 auto; padding: 24px; background-color: #ffffff; }
    .brand { font-size: 18px; font-weight: 700; color: #15803d; margin-bottom: 8px; }
    .title { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 8px; }
    .message { font-size: 14px; color: #374151; line-height: 1.6; margin-bottom: 16px; white-space: pre-line; }
    .footer { font-size: 12px; color: #6b7280; margin-top: 24px; text-align: center; }
    @media (max-width: 640px) { .container { padding: 16px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">HAGO PRODUCE</div>
    <div class="title">{{subject}}</div>
    <div class="message">{{message}}</div>
    <div class="footer">Este mensaje fue enviado desde la plataforma HAGO PRODUCE.</div>
  </div>
</body>
</html>
