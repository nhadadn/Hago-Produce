version: '3.8'

services:
  db_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: hago_produce_test
    ports:
      - "5434:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d hago_produce_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
